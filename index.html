
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
  <title>浮生若梦</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      width: 100%;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }
    
    /* ── 背景视频 ── */
    .bg-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    
    .bg-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
    }
    
    .bg-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: translateZ(0);
      will-change: transform;
    }
    
    /* ── 主内容区 ── */
    .welcome-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 36px;
      padding: 0 20px;
    }
    
    /* ── 标题 ── */
    .welcome-title {
      color: #fff;
      font-size: clamp(1.8em, 5vw, 3.2em);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 16px rgba(0,0,0,0.4);
      border-right: 2px solid rgba(255,255,255,0.8);
      white-space: nowrap;
      overflow: hidden;
      padding-right: 6px;
      min-height: 1.2em;
      transition: border-color 0.3s;
    }
    
    .welcome-title.done {
      border-color: transparent;
    }
    
    /* ── 进入按钮 ── */
    .enter-btn {
      text-decoration: none;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      padding: 13px 36px;
      border-radius: 40px;
      font-size: 1em;
      letter-spacing: 0.12em;
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: background 0.25s, border-color 0.25s, transform 0.2s;
      opacity: 0;
      transform: translateY(12px);
      will-change: transform, opacity;
    }
    
    .enter-btn.visible {
      animation: fadeUp 0.6s ease forwards;
    }
    
    .enter-btn:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: #fff;
      transform: translateY(-2px);
    }
    
    .enter-btn:active {
      transform: translateY(0);
    }
    
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* ── 音乐按钮 ── */
    .music-control {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.3em;
      color: #fff;
      z-index: 2;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    
    .music-control:hover {
      background: rgba(255, 255, 255, 0.28);
      transform: scale(1.08);
    }
    
    .music-control.playing {
      background: rgba(255, 180, 190, 0.3);
      border-color: rgba(255, 200, 210, 0.7);
    }
    
    .music-control.playing i {
      animation: spin 4s linear infinite;
    }
    
    .music-control.paused i {
      animation: floatNote 2s ease-in-out infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    
    @keyframes floatNote {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }
  </style>
</head>

<!-- 背景视频 -->
<div class="bg-container">
  <video autoplay muted loop playsinline>
    <source src="/assets/videos/1.mp4" type="video/mp4">
  </video>
</div>

<!-- 欢迎内容 -->
<div class="welcome-wrapper">
  <h1 class="welcome-title" id="typewriter-title"></h1>
  <a href="/blog/" class="enter-btn" id="enter-btn">进入博客</a>
</div>

<!-- 音乐按钮 -->
<button class="music-control" id="music-btn" aria-label="播放/暂停背景音乐">
  <i class="fa-solid fa-music"></i>
</button>

<!-- 背景音乐 -->
<audio id="bg-music" src="/assets/music/bg.mp3" loop preload="none"></audio>

<script>
  /* ── 音乐控制 ── */
  const music    = document.getElementById("bg-music");
  const musicBtn = document.getElementById("music-btn");
  const icon     = musicBtn.querySelector("i");

  function toggleMusic() {
    if (music.paused) {
      music.play().catch(() => {});
      musicBtn.classList.add("playing");
      musicBtn.classList.remove("paused");
      icon.className = "fa-solid fa-compact-disc";
    } else {
      music.pause();
      musicBtn.classList.remove("playing");
      musicBtn.classList.add("paused");
      icon.className = "fa-solid fa-music";
    }
  }

  musicBtn.addEventListener("click", toggleMusic);

  /* ── 打字机效果 ── */
  const titleEl   = document.getElementById("typewriter-title");
  const enterBtn  = document.getElementById("enter-btn");
  const prefix    = "✨ ";
  const text      = "欢迎来到我的博客";
  const fullText  = prefix + text;
  let index       = 0;

  function typeNext() {
    if (index < fullText.length) {
      titleEl.textContent += fullText[index++];
      setTimeout(typeNext, index <= prefix.length ? 80 : 150);
    } else {
      titleEl.classList.add("done");
      enterBtn.classList.add("visible");
    }
  }

  window.addEventListener("load", typeNext);
</script>
